name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest # WebView2 preinstalled; matches the app's primary target + keyring backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + frontend build
        run: npm run build # tsc --noEmit + vite build; the dist output is what tauri-build reads

      - name: Frontend unit + integration tests
        run: npm test

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
